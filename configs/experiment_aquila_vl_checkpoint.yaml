# Runner experiment: Aquila-VL intermediate checkpoint (stage2-c).
# Run in `.venv-aquila`:
#   PYTHONPATH=src python -m levante_bench.cli experiment=configs/experiment_aquila_vl_checkpoint.yaml device=cuda

models:
  - name: aquila_vl_checkpoint
    max_new_tokens: 256
    use_json_format: false

tasks:
  - egma-math
  - matrix-reasoning
  - mental-rotation
  - theory-of-mind
  - trog
  - vocab

data_root: data
output_dir: results
version: current
device: cuda

# Runner experiment: Gemma 4 E2B IT on v1 benchmark tasks.
# Run: python -m levante_bench.cli experiment=configs/experiment_gemma4_e2b_v1.yaml device=auto

models:
  - name: gemma4
    size: E2B-it
    use_json_format: false

tasks:
  - egma-math
  - matrix-reasoning
  - mental-rotation
  - theory-of-mind
  - trog
  - vocab

data_root: data
output_dir: results
version: v1
device: cuda

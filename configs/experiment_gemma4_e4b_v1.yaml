# Runner experiment: Gemma 4 E4B IT on v1 benchmark tasks.
# Run: python -m levante_bench.cli experiment=configs/experiment_gemma4_e4b_v1.yaml device=auto

models:
  - name: gemma4
    size: E4B-it
    use_json_format: false

tasks:
  - egma-math
  - matrix-reasoning
  - mental-rotation
  - theory-of-mind
  - trog
  - vocab

data_root: data
output_dir: results/gemma4-v1
version: v1
device: cuda

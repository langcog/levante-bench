# Runner experiment: InternVL3.5-HF 2B with non-JSON answer mode for cleaner parsing.
# Run: python -m levante_bench.cli experiment=configs/experiment_internvl35_2b_nojson.yaml device=auto

models:
  - name: internvl35
    size: 2B
    max_new_tokens: 256
    use_json_format: false

tasks:
  - egma-math
  - matrix-reasoning
  - mental-rotation
  - theory-of-mind
  - trog
  - vocab

data_root: data
output_dir: results/internvl35-nojson
version: current
device: cuda

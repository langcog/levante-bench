# Runner experiment: SmolVLM2 500M Instruct on v1 benchmark tasks.
# Run: python -m levante_bench.cli experiment=configs/experiment_smolvlm2_500m_v1.yaml device=auto

models:
  - name: smolvlm2
    size: 500M
    use_json_format: false

tasks:
  - egma-math
  - matrix-reasoning
  - mental-rotation
  - theory-of-mind
  - trog
  - vocab

data_root: data
output_dir: results
version: v1
device: cuda

# Runner smoke: Aquila intermediate stage2-a on one task.
# Run in `.venv-aquila`:
#   PYTHONPATH=src python -m levante_bench.cli experiment=configs/experiments/aquila_stage2a_smoke.yaml device=cuda

models:
  - name: aquila_vl_checkpoint
    size: stage2a
    checkpoint_subdir: stage2-a-llava-qwen
    max_new_tokens: 256
    use_json_format: false

tasks:
  - vocab

data_root: data
output_dir: results/aquila-checkpoints
version: current
device: cuda

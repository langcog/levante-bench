# Runner experiment: SmolVLM2 256M Instruct on v1 benchmark tasks.
# Run: python -m levante_bench.cli experiment=configs/experiments/smolvlm2_256m_v1.yaml device=auto

models:
  - name: smolvlm2
    size: 256M
    use_json_format: false

tasks:
  - mental-rotation

data_root: data
output_dir: results/mr_prompts_image_first
version: v1
device: cuda

task_overrides:
  mental-rotation:
    mental_rotation_prompt_template: |
      <image0>\n<image1>\n 
      The first image is the reference shape.
      The second image is option A. The third image is option B.
      One option is the same shape rotated to a different angle.
      The other is a MIRROR image (horizontally flipped).
      Which option matches the reference - just rotated, NOT flipped?
      Answer with one letter: A or B.

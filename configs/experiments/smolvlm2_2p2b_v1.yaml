# Runner experiment: SmolVLM2 2.2B Instruct on v1 benchmark tasks.
# Run: python -m levante_bench.cli experiment=configs/experiments/smolvlm2_2p2b_v1.yaml device=auto

models:
  - name: smolvlm2
    size: 2.2B
    use_json_format: false

tasks:
  - egma-math
  - matrix-reasoning
  - mental-rotation
  - theory-of-mind
  - trog
  - vocab

data_root: data
output_dir: results
version: v1
device: cuda

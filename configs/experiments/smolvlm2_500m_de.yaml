# Runner experiment: SmolVLM2 500M Instruct on German prompts.
# Run: python -m levante_bench.cli experiment=configs/experiments/smolvlm2_500m_de.yaml device=auto

models:
  - name: smolvlm2
    size: 500M
    use_json_format: false

tasks:
  - egma-math
  - matrix-reasoning
  - mental-rotation
  - theory-of-mind
  - trog
  - vocab

task_overrides:
  __all__:
    prompt_language: de

data_root: data
output_dir: results/german-full
version: hackathon
device: cuda

# Prompt experiment: SmolVLM2 500M with mental-rotation invert hint.
# Run: python -m levante_bench.cli experiment=configs/experiments/smolvlm2_500m_invert.yaml device=auto

models:
  - name: smolvlm2
    size: 500M
    use_json_format: false

tasks:
  - mental-rotation

data_root: data
output_dir: results/mr_prompt_invert_500m
version: v1
device: cuda
max_new_tokens: 128

task_overrides:
  mental-rotation:
    mental_rotation_prompt_template: |
      The first image is the reference shape.
      The second image is option A. The third image is option B.

      One option is the same shape rotated to a different angle.
      The other is a MIRROR image (horizontally flipped).
      You may need to invert the pixels on the A image and on the B image for the best match.
      Which option matches the reference - just rotated, NOT flipped?

      Answer with one letter: A or B.

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Levante-Bench Results Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/levante_icon.svg" />
    <link rel="stylesheet" href="/results-dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header-title-row">
          <img class="header-logo" src="/levante_icon.svg" alt="Levante logo" />
          <h1>Levante-Bench Results Dashboard</h1>
        </div>
        <p>Filter models, tasks, and languages. Compare task-level accuracy curves.</p>
      </header>

      <section class="dashboard-grid">
        <aside class="sidebar">
          <div class="control-group">
            <label for="models">Models</label>
            <select id="models" multiple size="10"></select>
            <button id="all-models" type="button">All</button>
          </div>

          <div class="control-group">
            <label for="tasks">Tasks</label>
            <select id="tasks" multiple size="10"></select>
            <button id="all-tasks" type="button">All</button>
          </div>

          <div class="control-group">
            <label for="languages">Languages</label>
            <select id="languages" multiple size="6"></select>
            <button id="all-languages" type="button">All</button>
          </div>
        </aside>

        <div class="main-panel">
          <section class="status-row">
            <div id="status">Loading report...</div>
            <div id="meta"></div>
          </section>

          <section class="chart-wrap">
            <canvas id="results-chart"></canvas>
          </section>

          <section class="summary-wrap">
            <h2>Summary</h2>
            <div id="summary-stats"></div>
          </section>

          <section class="table-wrap">
            <table id="results-table">
              <thead>
                <tr>
                  <th>Model</th>
                  <th>Language</th>
                  <th>Tasks</th>
                  <th>Mean Accuracy</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </section>
        </div>
      </section>
    </main>

    <script src="/results-dashboard.js"></script>
  </body>
</html>

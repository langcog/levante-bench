<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Levante Results Dashboard</title>
    <link rel="stylesheet" href="/results-dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Levante Results Dashboard</h1>
        <p>Filter models, tasks, and languages. Compare mean task accuracy.</p>
      </header>

      <section class="controls">
        <div class="control-group">
          <label for="models">Models</label>
          <select id="models" multiple size="10"></select>
          <button id="all-models" type="button">All</button>
        </div>

        <div class="control-group">
          <label for="tasks">Tasks</label>
          <select id="tasks" multiple size="10"></select>
          <button id="all-tasks" type="button">All</button>
        </div>

        <div class="control-group">
          <label for="languages">Languages</label>
          <select id="languages" multiple size="6"></select>
          <button id="all-languages" type="button">All</button>
        </div>
      </section>

      <section class="status-row">
        <div id="status">Loading report...</div>
        <div id="meta"></div>
      </section>

      <section class="chart-wrap">
        <canvas id="results-chart"></canvas>
      </section>

      <section class="table-wrap">
        <table id="results-table">
          <thead>
            <tr>
              <th>Model</th>
              <th>Language</th>
              <th>Tasks</th>
              <th>Mean Accuracy</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="/results-dashboard.js"></script>
  </body>
</html>
